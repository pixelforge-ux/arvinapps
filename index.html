<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ARVIN GAMES</title>

  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0b0f1a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 340px;
      max-height: 90vh;
      overflow-y: auto;
      background: rgba(0,0,0,0.6);
      padding: 16px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #ffd84a;
      margin-bottom: 16px;
    }

    .card {
      background: #2a2a3d;
      border-radius: 8px;
      margin-bottom: 14px;
      cursor: pointer;
      transition: transform .2s;
      overflow: hidden;
    }

    .card:hover { transform: translateY(-3px); }

    /* باکس تصویر */
    .preview {
      max-height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 10px;
    }

    .title {
      background: rgba(0,0,0,0.35);
      padding: 10px;
      font-size: 1.1rem;
      text-align: center;
    }

    /* دوز */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 45px);
      grid-template-rows: repeat(3, 45px);
      gap: 5px;
    }

    .cell {
      background: #e2b574;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
    }

    .cell.x { color: #e63737; }
    .cell.o { color: #1da3dd; }

    /* 2048 */
    .icon-2048 {
      width: 120px;
      height: 120px;
      border-radius: 22%;
      background: linear-gradient(145deg, #ffe259, #f6aa2c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 40px;
      font-weight: bold;
      color: white;
    }

    img {
      max-width: 120px;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>ARVIN GAMES</h1>

  <!-- دوز -->
  <div class="card" data-app="app_207">
    <div class="preview">
      <div class="board">
        <div class="cell o">O</div>
        <div class="cell x">X</div>
        <div class="cell x">X</div>
        <div class="cell x">X</div>
        <div class="cell o">O</div>
        <div class="cell o">O</div>
        <div class="cell o">O</div>
        <div class="cell x">X</div>
        <div class="cell x">X</div>
      </div>
    </div>
    <div class="title">دوز</div>
  </div>

  <!-- فلپی -->
  <div class="card" data-app="app_126">
    <div class="preview">
      <img src="https://upload.wikimedia.org/wikipedia/en/0/0a/Flappy_Bird_icon.png">
    </div>
    <div class="title">پرنده فلپی</div>
  </div>

  <!-- 2048 -->
  <div class="card" data-app="app_205">
    <div class="preview">
      <div class="icon-2048">2048</div>
    </div>
    <div class="title">۲۰۴۸</div>
  </div>
</div>

<script>
  if (window.Eitaa && Eitaa.WebApp && typeof Eitaa.WebApp.ready === 'function') {
    Eitaa.WebApp.ready();
  }

  function isInsideEitaa() {
    return !!(window.Eitaa && Eitaa.WebApp);
  }

  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const appId = card.dataset.app;
      if (!appId) return;

      const url = isInsideEitaa()
        ? `https://eitaa.com/store_app/app?startapp=${appId}`
        : `eitaa://store_app/app?startapp=${appId}`;

      window.location.href = url;
    });
  });
</script>
</body>
</html>
