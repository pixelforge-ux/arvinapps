<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ARVIN GAMES</title>

  <!-- SDK رسمی ایتا -->
  <script src="https://developer.eitaa.com/eitaa-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      background: #0b0f1a;
    }
    canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
    }
    .container {
      width: 340px;
      background: rgba(0,0,0,0.55);
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #ffd84a;
    }
    .card {
      background: #2a2a3d;
      margin-bottom: 14px;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
    }
    .title {
      margin-top: 10px;
      font-size: 1.1rem;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 6px;
      justify-content: center;
      margin: 0 auto;
    }
    .cell {
      background: #e2b574;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
    }
    .cell.x { color: #e63737; }
    .cell.o { color: #1da3dd; }

    .icon-2048 {
      width: 160px;
      height: 160px;
      border-radius: 25%;
      background: linear-gradient(145deg, #ffe259, #f6aa2c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 52px;
      font-weight: bold;
      margin: 0 auto;
    }
  </style>
</head>

<body>
<canvas id="particles"></canvas>

<div class="container">
  <h1>ARVIN GAMES</h1>

  <div class="card" data-link="eitaa://store_app/app?startapp=app_207">
    <div class="board">
      <div class="cell o">O</div><div class="cell x">X</div><div class="cell x">X</div>
      <div class="cell x">X</div><div class="cell o">O</div><div class="cell o">O</div>
      <div class="cell o">O</div><div class="cell x">X</div><div class="cell x">X</div>
    </div>
    <div class="title">دوز</div>
  </div>

  <div class="card" data-link="eitaa://store_app/app?startapp=app_126">
    <img src="https://upload.wikimedia.org/wikipedia/en/0/0a/Flappy_Bird_icon.png" width="120">
    <div class="title">پرنده فلپی</div>
  </div>

  <div class="card" data-link="eitaa://store_app/app?startapp=app_205">
    <div class="icon-2048">2048</div>
    <div class="title">۲۰۴۸</div>
  </div>
</div>

<script>
  // آماده‌سازی SDK ایتا
  if (window.Eitaa && Eitaa.WebApp && typeof Eitaa.WebApp.ready === 'function') {
    Eitaa.WebApp.ready();
  }

  // کلیک کارت‌ها (روش صحیح باز کردن لینک داخلی ایتا)
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const link = card.dataset.link;
      if (link) {
        window.location.href = link;
      }
    });
  });

  // ذرات پس‌زمینه
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }

  function createParticles() {
    particles = [];
    for (let i = 0; i < 60; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
      });
    }
  }

  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if (p.x<0||p.x>canvas.width) p.dx*=-1;
      if (p.y<0||p.y>canvas.height) p.dy*=-1;
    });
    requestAnimationFrame(animate);
  }

  resize();
  createParticles();
  animate();
  addEventListener('resize', resize);
</script>
</body>
</html>
